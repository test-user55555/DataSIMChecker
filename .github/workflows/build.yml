name: Build Android APK

on:
  push:
    branches: [ main, genspark_ai_developer ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Build Release APK (unsigned)
        run: ./gradlew :app:assembleRelease
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Rename and collect APKs
        run: |
          mkdir -p artifacts
          VER=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"' | head -1)
          CODE=$(grep 'versionCode' app/build.gradle.kts | grep -oP '[0-9]+' | head -1)
          BUILD=${{ github.run_number }}
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/SimMonitor-debug-v${VER}-${CODE}-build${BUILD}.apk"
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             "artifacts/SimMonitor-release-unsigned-v${VER}-${CODE}-build${BUILD}.apk"
          ls -lh artifacts/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-debug-v${{ github.run_number }}
          path: artifacts/SimMonitor-debug-*.apk
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-release-unsigned-v${{ github.run_number }}
          path: artifacts/SimMonitor-release-unsigned-*.apk
          retention-days: 14
