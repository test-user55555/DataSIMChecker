name: Build Android APK

on:
  push:
    branches:
      - main
      - genspark_ai_developer
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Restore keystore
        env:
          KSBASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KSBASE64" | base64 -d > simmonitor-release.keystore

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          GRADLE_OPTS: "-Xmx4g"

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          GRADLE_OPTS: "-Xmx4g"
          KEYSTORE_PATH: simmonitor-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect and rename APKs
        run: |
          mkdir -p artifacts
          VER=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"' | head -1)
          CODE=$(grep 'versionCode' app/build.gradle.kts | grep -oP '[0-9]+' | head -1)
          BUILD=${{ github.run_number }}
          cp app/build/outputs/apk/debug/app-debug.apk \
             "artifacts/SimMonitor-debug-v${VER}-${CODE}-build${BUILD}.apk"
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            cp app/build/outputs/apk/release/app-release.apk \
               "artifacts/SimMonitor-release-v${VER}-${CODE}-build${BUILD}.apk"
          else
            cp app/build/outputs/apk/release/app-release-unsigned.apk \
               "artifacts/SimMonitor-release-v${VER}-${CODE}-build${BUILD}.apk"
          fi
          ls -lh artifacts/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-debug-build${{ github.run_number }}
          path: artifacts/SimMonitor-debug-*.apk
          retention-days: 14

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-release-build${{ github.run_number }}
          path: artifacts/SimMonitor-release-*.apk
          retention-days: 14
