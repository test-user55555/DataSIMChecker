name: Build Android APK

on:
  push:
    branches: [ main, genspark_ai_developer ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-v2-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --max-workers=2
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --max-workers=2
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SimMonitor-debug-${{ github.run_number }}.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             artifacts/SimMonitor-release-unsigned-${{ github.run_number }}.apk
          ls -lh artifacts/

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-debug-apk
          path: artifacts/SimMonitor-debug-${{ github.run_number }}.apk
          retention-days: 14

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-release-unsigned-apk
          path: artifacts/SimMonitor-release-unsigned-${{ github.run_number }}.apk
          retention-days: 14

      - name: Build Summary
        if: always()
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          if ls artifacts/*.apk 2>/dev/null; then
            echo "| ファイル | サイズ |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
            for f in artifacts/*.apk; do
              size=$(du -sh "$f" | cut -f1)
              name=$(basename "$f")
              echo "| \`$name\` | $size |" >> $GITHUB_STEP_SUMMARY
            done
            echo "✅ APKはActionsタブの Artifacts からダウンロードできます" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APKの生成に失敗しました" >> $GITHUB_STEP_SUMMARY
          fi
