name: Build Android APK

on:
  push:
    branches: [ main, genspark_ai_developer ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # 手動実行も可能

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ─────────────────────────────────────────
      # 1. ソースコードのチェックアウト
      # ─────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 2. JDK 17 セットアップ
      # ─────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ─────────────────────────────────────────
      # 3. Android SDK セットアップ
      # ─────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─────────────────────────────────────────
      # 4. Gradle キャッシュ
      # ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ─────────────────────────────────────────
      # 5. gradlew に実行権限を付与
      # ─────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─────────────────────────────────────────
      # 6. Debug APK ビルド
      # ─────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ─────────────────────────────────────────
      # 7. Release APK ビルド（署名なし）
      # ─────────────────────────────────────────
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ─────────────────────────────────────────
      # 8. APK をリネームして整理
      # ─────────────────────────────────────────
      - name: Rename APKs
        run: |
          mkdir -p artifacts
          # Debug APK
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SimMonitor-debug-${{ github.run_number }}.apk
          # Release APK
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             artifacts/SimMonitor-release-unsigned-${{ github.run_number }}.apk
          echo "=== APK Files ==="
          ls -lh artifacts/

      # ─────────────────────────────────────────
      # 9. Debug APK をアーティファクトとしてアップロード
      # ─────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-debug-apk
          path: artifacts/SimMonitor-debug-${{ github.run_number }}.apk
          retention-days: 14

      # ─────────────────────────────────────────
      # 10. Release APK をアーティファクトとしてアップロード
      # ─────────────────────────────────────────
      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-release-unsigned-apk
          path: artifacts/SimMonitor-release-unsigned-${{ github.run_number }}.apk
          retention-days: 14

      # ─────────────────────────────────────────
      # 11. ビルド結果サマリーをGitHub Summaryに出力
      # ─────────────────────────────────────────
      - name: Build Summary
        if: always()
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| ファイル | サイズ |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          for f in artifacts/*.apk; do
            size=$(du -sh "$f" | cut -f1)
            name=$(basename "$f")
            echo "| \`$name\` | $size |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ APKはActionsタブの **Artifacts** からダウンロードできます" >> $GITHUB_STEP_SUMMARY
