name: Build Android APK

on:
  push:
    branches: [ main, genspark_ai_developer ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. ソースコードのチェックアウト
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. JDK 17 セットアップ
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Gradle キャッシュ
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. gradlew に実行権限を付与
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 5. Android SDK の build-tools / platforms を確認
      - name: Accept Android SDK licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "build-tools;35.0.0" 2>/dev/null || true

      # 6. Debug APK ビルド
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      # 7. Release APK ビルド（署名なし）
      - name: Build Release APK (unsigned)
        run: ./gradlew :app:assembleRelease --stacktrace

      # 8. APK をリネームして整理
      - name: Collect APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SimMonitor-debug-${{ github.run_number }}.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             artifacts/SimMonitor-release-unsigned-${{ github.run_number }}.apk
          echo "=== APK Files ==="
          ls -lh artifacts/

      # 9. Debug APK アップロード
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-debug-apk
          path: artifacts/SimMonitor-debug-${{ github.run_number }}.apk
          retention-days: 14

      # 10. Release APK アップロード
      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: SimMonitor-release-unsigned-apk
          path: artifacts/SimMonitor-release-unsigned-${{ github.run_number }}.apk
          retention-days: 14

      # 11. ビルド結果サマリー
      - name: Build Summary
        if: always()
        run: |
          echo "## 📦 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls artifacts/*.apk 2>/dev/null; then
            echo "| ファイル | サイズ |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
            for f in artifacts/*.apk; do
              size=$(du -sh "$f" | cut -f1)
              name=$(basename "$f")
              echo "| \`$name\` | $size |" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ APKはActionsタブの **Artifacts** からダウンロードできます" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ APKの生成に失敗しました" >> $GITHUB_STEP_SUMMARY
          fi
